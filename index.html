<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slot Machine</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="navbar">
    <h1 class="logo">Frankie's Slot Game</h1>
    <nav>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Game</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="hero">
      <h2>Try Your Luck</h2>
      <p>Same symbols in a row or column and you win the game!</p>
    </section>

    <section class="game-container">

      <article class="grid">
        <div class="cell" id="c1"></div>
        <div class="cell" id="c2"></div>
        <div class="cell" id="c3"></div>

        <div class="cell" id="c4"></div>
        <div class="cell" id="c5"></div>
        <div class="cell" id="c6"></div>

        <div class="cell" id="c7"></div>
        <div class="cell" id="c8"></div>
        <div class="cell" id="c9"></div>
      </article>

      <button id="spin-btn">🎯 Spin</button>
      <p id="result"></p>

    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <ul class="nav-links">
      <li><a href="mailto:kalisowe2@gmail.com">kalisowe2@gmail.com</a></li>
      <li><a href="#">Address</a></li>
      <li><a href="#">More Info</a></li>
      <li class="copyright">© 2024 Frankie Slot Game</li>
    </ul>
  </footer>

  <script src="script.js"></script>
</body>

</html>
